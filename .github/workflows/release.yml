name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  # ── Build WSL tarball ──────────────────────────────────────────────────────
  build-wsl:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      wsl_artifact: ${{ steps.version.outputs.artifact }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact=maude-wsl-ubuntu2604-${VERSION}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Install debootstrap
        run: sudo apt-get update -qq && sudo apt-get install -y debootstrap

      - name: Bootstrap Ubuntu 26.04 minimal rootfs
        run: |
          sudo mkdir -p /rootfs
          # Phase 1: minimal bootstrap with only core packages from main
          sudo debootstrap \
            --arch=amd64 \
            --variant=minbase \
            --components=main,restricted,universe \
            --include=ca-certificates,curl,wget,sudo,locales,tzdata \
            plucky \
            /rootfs \
            http://archive.ubuntu.com/ubuntu/

      - name: Install packages via chroot
        run: |
          sudo mount --bind /proc    /rootfs/proc
          sudo mount --bind /sys     /rootfs/sys
          sudo mount --bind /dev     /rootfs/dev
          sudo mount --bind /dev/pts /rootfs/dev/pts

          sudo tee /rootfs/etc/apt/sources.list > /dev/null <<'EOF'
deb http://archive.ubuntu.com/ubuntu/ plucky main restricted universe multiverse
deb http://archive.ubuntu.com/ubuntu/ plucky-updates main restricted universe multiverse
deb http://security.ubuntu.com/ubuntu/ plucky-security main restricted universe multiverse
EOF
          sudo chroot /rootfs apt-get update -qq
          sudo chroot /rootfs apt-get install -y --no-install-recommends \
            git git-lfs \
            python3 python3-pip python3-venv python3-dev \
            nodejs npm \
            golang-go \
            tmux \
            openssh-server openssh-client \
            bash-completion \
            vim nano \
            jq tree file less \
            build-essential pkg-config \
            libssl-dev libffi-dev \
            net-tools bind9-dnsutils \
            iputils-ping iproute2 \
            unzip zip \
            ripgrep \
            ufw fail2ban

          sudo chroot /rootfs apt-get clean
          sudo rm -rf /rootfs/var/lib/apt/lists/*

          sudo umount /rootfs/dev/pts
          sudo umount /rootfs/dev
          sudo umount /rootfs/sys
          sudo umount /rootfs/proc

      - name: Configure rootfs
        run: |
          sudo chroot /rootfs locale-gen en_US.UTF-8 || true
          echo 'LANG=en_US.UTF-8' | sudo tee /rootfs/etc/default/locale

          sudo mkdir -p /rootfs/etc/maude
          sudo chroot /rootfs useradd \
            --create-home --shell /bin/bash \
            --comment "maude default user" maude 2>/dev/null || true
          echo 'maude:maude' | sudo chroot /rootfs chpasswd
          printf 'maude ALL=(ALL) NOPASSWD:ALL\n' | \
            sudo tee /rootfs/etc/sudoers.d/maude
          sudo chmod 440 /rootfs/etc/sudoers.d/maude

          sudo cp scripts/profile.d/maude-path.sh       /rootfs/etc/profile.d/
          sudo cp scripts/profile.d/maude-firstlogin.sh  /rootfs/etc/profile.d/
          sudo cp scripts/new-user-login.sh              /rootfs/etc/maude/
          sudo cp scripts/first-boot.sh                  /rootfs/etc/maude/
          sudo cp scripts/maude-setup                    /rootfs/usr/local/bin/
          sudo cp scripts/maude-adduser                  /rootfs/usr/local/bin/
          sudo chmod 644 /rootfs/etc/profile.d/maude-*.sh
          sudo chmod 755 /rootfs/etc/maude/new-user-login.sh \
                         /rootfs/etc/maude/first-boot.sh \
                         /rootfs/usr/local/bin/maude-setup \
                         /rootfs/usr/local/bin/maude-adduser

          printf 'MAUDE_VERSION=%s\nMAUDE_BUILD_DATE=%s\nMAUDE_DEPLOY_TARGET=wsl\n' \
            "${{ steps.version.outputs.version }}" "$(date -Iseconds)" \
            | sudo tee /rootfs/etc/maude/maude.conf

          sudo tee /rootfs/etc/wsl.conf > /dev/null <<'EOF'
[boot]
systemd=true
command=/etc/maude/first-boot.sh

[user]
default=maude

[interop]
enabled=true
appendWindowsPath=false
EOF

          if [[ -f /rootfs/etc/ssh/sshd_config ]]; then
            sudo sed -i \
              -e 's/^#PermitRootLogin.*/PermitRootLogin no/' \
              -e 's/^#PasswordAuthentication.*/PasswordAuthentication yes/' \
              -e 's/^#MaxAuthTries.*/MaxAuthTries 5/' \
              /rootfs/etc/ssh/sshd_config
          fi

      - name: Create tarball
        run: |
          sudo tar -czf "${{ steps.version.outputs.artifact }}" \
            --numeric-owner -C /rootfs .
          sha256sum "${{ steps.version.outputs.artifact }}" \
            > "${{ steps.version.outputs.artifact }}.sha256"

      - name: Upload WSL artifact
        uses: actions/upload-artifact@v4
        with:
          name: wsl-image
          path: |
            ${{ steps.version.outputs.artifact }}
            ${{ steps.version.outputs.artifact }}.sha256

  # ── Build Docker image ─────────────────────────────────────────────────────
  build-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ── Create GitHub Release ─────────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: [build-wsl, build-docker]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download WSL artifact
        uses: actions/download-artifact@v4
        with:
          name: wsl-image
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          gh release create "${VERSION}" \
            --title "maude ${VERSION}" \
            --notes "$(cat <<EOF
## maude ${VERSION}

Ready-to-run sandbox appliance for agentic coding on Ubuntu 26.04.

### Artifacts

| File | Description |
|------|-------------|
| \`maude-wsl-ubuntu2604-${VERSION}.tar.gz\` | WSL2 image — import with \`wsl --import\` |
| \`maude-wsl-ubuntu2604-${VERSION}.tar.gz.sha256\` | SHA-256 checksum |
| \`ghcr.io/dirkpetersen/maude:${VERSION}\` | Docker image |

### Quick Start

**WSL:**
\`\`\`powershell
wsl --import maude C:\maude .\maude-wsl-ubuntu2604-${VERSION}.tar.gz
wsl -d maude
\`\`\`

**Docker:**
\`\`\`bash
docker run -d -p 3000:3000 --name maude ghcr.io/dirkpetersen/maude:${VERSION}
\`\`\`

See [README](https://github.com/dirkpetersen/maude#readme) for full documentation.
EOF
)" \
            dist/maude-wsl-ubuntu2604-${VERSION}.tar.gz \
            dist/maude-wsl-ubuntu2604-${VERSION}.tar.gz.sha256
