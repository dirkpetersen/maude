name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  # ── Build WSL tarball ──────────────────────────────────────────────────────
  build-wsl:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      wsl_artifact: ${{ steps.version.outputs.artifact }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact=maude-wsl-ubuntu2604-${VERSION}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Build WSL rootfs via Docker
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          docker run --name maude-wsl-build ubuntu:plucky bash -c "
            export DEBIAN_FRONTEND=noninteractive TZ=UTC
            apt-get update -qq
            apt-get install -y --no-install-recommends \
              ca-certificates curl wget sudo locales tzdata \
              git \
              python3 python3-pip python3-venv python3-dev \
              nodejs npm \
              golang-go \
              tmux \
              openssh-server openssh-client \
              bash-completion \
              vim nano \
              jq tree file less \
              build-essential pkg-config \
              libssl-dev libffi-dev \
              net-tools bind9-dnsutils \
              iputils-ping iproute2 \
              unzip zip \
              ripgrep \
              ufw fail2ban
            apt-get clean
            rm -rf /var/lib/apt/lists/*
            locale-gen en_US.UTF-8
            echo 'LANG=en_US.UTF-8' > /etc/default/locale
            useradd --create-home --shell /bin/bash --comment 'maude default user' maude
            echo 'maude:maude' | chpasswd
            echo 'maude ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/maude
            chmod 440 /etc/sudoers.d/maude
          "

          docker exec maude-wsl-build mkdir -p /etc/maude
          docker cp scripts/profile.d/maude-path.sh       maude-wsl-build:/etc/profile.d/
          docker cp scripts/profile.d/maude-firstlogin.sh  maude-wsl-build:/etc/profile.d/
          docker cp scripts/new-user-login.sh              maude-wsl-build:/etc/maude/
          docker cp scripts/first-boot.sh                  maude-wsl-build:/etc/maude/
          docker cp scripts/maude-setup                    maude-wsl-build:/usr/local/bin/
          docker cp scripts/maude-adduser                  maude-wsl-build:/usr/local/bin/

          docker exec maude-wsl-build bash -c "
            chmod 644 /etc/profile.d/maude-*.sh
            chmod 755 /etc/maude/new-user-login.sh /etc/maude/first-boot.sh
            chmod 755 /usr/local/bin/maude-setup /usr/local/bin/maude-adduser
            printf 'MAUDE_VERSION=${VERSION}\nMAUDE_BUILD_DATE=$(date -Iseconds)\nMAUDE_DEPLOY_TARGET=wsl\n' \
              > /etc/maude/maude.conf
            printf '[boot]\nsystemd=true\ncommand=/etc/maude/first-boot.sh\n\n[user]\ndefault=maude\n\n[interop]\nenabled=true\nappendWindowsPath=false\n' \
              > /etc/wsl.conf
            sed -i \
              -e 's/^#PermitRootLogin.*/PermitRootLogin no/' \
              -e 's/^#PasswordAuthentication.*/PasswordAuthentication yes/' \
              -e 's/^#MaxAuthTries.*/MaxAuthTries 5/' \
              /etc/ssh/sshd_config 2>/dev/null || true
          "

      - name: Export container as WSL tarball
        run: |
          ARTIFACT="${{ steps.version.outputs.artifact }}"
          docker export maude-wsl-build | gzip > "${ARTIFACT}"
          docker rm maude-wsl-build
          sha256sum "${ARTIFACT}" > "${ARTIFACT}.sha256"

      - name: Upload WSL artifact
        uses: actions/upload-artifact@v4
        with:
          name: wsl-image
          path: |
            ${{ steps.version.outputs.artifact }}
            ${{ steps.version.outputs.artifact }}.sha256

  # ── Build Docker image ─────────────────────────────────────────────────────
  build-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ── Create GitHub Release ─────────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: [build-wsl, build-docker]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download WSL artifact
        uses: actions/download-artifact@v4
        with:
          name: wsl-image
          path: dist/

      - name: Generate release notes from template
        run: |
          VERSION="${{ github.ref_name }}"
          sed "s/MAUDE_VERSION/${VERSION}/g" \
            .github/release-notes-template.md > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          gh release create "${VERSION}" \
            --title "maude ${VERSION}" \
            --notes-file /tmp/release-notes.md \
            "dist/maude-wsl-ubuntu2604-${VERSION}.tar.gz" \
            "dist/maude-wsl-ubuntu2604-${VERSION}.tar.gz.sha256"
